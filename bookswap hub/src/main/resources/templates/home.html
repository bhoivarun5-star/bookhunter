<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home – BookSwap Hub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" th:href="@{/css/books.css}" />
</head>

<body>
    <div class="page-wrapper" style="max-width:800px;">

        <!-- Nav -->
        <nav class="top-nav">
            <a class="nav-brand" th:href="@{/books}">📚 BookSwap Hub</a>
            <div class="nav-links">
                <a class="nav-link" th:href="@{/books}">Browse Books</a>
                <a class="nav-link accent" th:href="@{/books/new}">+ List Book</a>
                <a class="nav-link" th:href="@{/books/my-listings}">My Listings</a>
                <a class="nav-link" th:href="@{/my-requests}">My Requests</a>
                <a class="nav-link" th:href="@{/owner/requests}">📬 Inbox</a>
                <form th:action="@{/logout}" method="post" style="margin:0">
                    <button type="submit" class="nav-link" style="background:none;cursor:pointer;">Sign Out</button>
                </form>
            </div>
        </nav>

        <!-- Welcome card -->
        <div class="home-card">
            <div class="welcome-avatar">📚</div>
            <div class="badge">✓ Logged In</div>
            <h1>Welcome, <span th:text="${username}">User</span>!</h1>
            <p>
                You're on <strong>BookSwap Hub</strong>.<br />
                Discover books near you, list your own, or swap with readers in your area.
            </p>

            <!-- Quick action cards -->
            <div class="stats-row">
                <a th:href="@{/books}" class="stat-card" style="text-decoration:none;cursor:pointer;">
                    <div class="stat-value">🔍</div>
                    <div class="stat-label">Browse Books</div>
                </a>
                <a th:href="@{/books/new}" class="stat-card" style="text-decoration:none;cursor:pointer;">
                    <div class="stat-value">📤</div>
                    <div class="stat-label">List a Book</div>
                </a>
                <a th:href="@{/owner/requests}" class="stat-card" style="text-decoration:none;cursor:pointer;">
                    <div class="stat-value">📬</div>
                    <div class="stat-label">My Inbox</div>
                </a>
            </div>

            <a th:href="@{/books}" class="btn btn-primary" style="max-width:240px;margin:0 auto;">
                Start Browsing →
            </a>
        </div>

    </div>
</body>

</html>
