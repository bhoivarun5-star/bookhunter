<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>List a Book – BookSwap Hub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" th:href="@{/css/books.css}" />
</head>

<body>
    <div class="page-wrapper">

        <nav class="top-nav">
            <a class="nav-brand" th:href="@{/books}">📚 BookSwap Hub</a>
            <div class="nav-links">
                <a class="nav-link" th:href="@{/books}">Browse</a>
                <th:block th:if="${isLoggedIn}">
                    <a class="nav-link active" th:href="@{/books/new}">+ List Book</a>
                    <a class="nav-link" th:href="@{/books/my-listings}">My Listings</a>
                    <a class="nav-link" th:href="@{/my-requests}">My Requests</a>
                    <a class="nav-link" th:href="@{/owner/requests}">Inbox</a>
                    <form th:action="@{/logout}" method="post" style="margin:0">
                        <button type="submit" class="nav-link" style="background:none;cursor:pointer;border:none;">Sign
                            Out</button>
                    </form>
                </th:block>
                <th:block th:unless="${isLoggedIn}">
                    <a class="nav-link" th:href="@{/login}">🔑 Login</a>
                    <a class="nav-link accent" th:href="@{/register}">✨ Register</a>
                </th:block>
            </div>
        </nav>

        <div class="form-card">
            <h2>📤 List a Book</h2>

            <div class="flash-error" th:if="${errorMessage}">❌ <span th:text="${errorMessage}"></span></div>

            <form th:action="@{/books/new}" method="post" enctype="multipart/form-data">

                <!-- Book Image -->
                <div class="form-group">
                    <label>Book Image</label>
                    <div class="image-upload" onclick="document.getElementById('imageInput').click()">
                        <div class="upload-icon">🖼️</div>
                        <p id="imageLabel">Click to upload image (max 10MB)</p>
                        <input type="file" id="imageInput" name="image" accept="image/*"
                            onchange="document.getElementById('imageLabel').textContent = this.files[0].name" />
                    </div>
                </div>

                <!-- Title + Author -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="title">Book Title *</label>
                        <div class="input-wrapper">
                            <input type="text" id="title" name="title" class="form-control"
                                placeholder="e.g. The Alchemist" required />
                            <span class="input-icon">📖</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="author">Author *</label>
                        <div class="input-wrapper">
                            <input type="text" id="author" name="author" class="form-control"
                                placeholder="e.g. Paulo Coelho" required />
                            <span class="input-icon">✍️</span>
                        </div>
                    </div>
                </div>

                <!-- Description -->
                <div class="form-group">
                    <label for="description">Description *</label>
                    <div class="input-wrapper">
                        <textarea id="description" name="description" class="form-control"
                            placeholder="Describe the book, its condition, and any other details…" required></textarea>
                    </div>
                </div>

                <!-- Price + Category -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="price">Price (₹) *</label>
                        <div class="input-wrapper">
                            <input type="number" id="price" name="price" class="form-control" placeholder="e.g. 150"
                                min="0" step="0.01" required />
                            <span class="input-icon">💰</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="category">Category *</label>
                        <select id="category" name="category" class="form-select" required>
                            <option value="" disabled selected>Select category</option>
                            <option th:each="cat : ${categories}" th:value="${cat.name()}" th:text="${cat.displayName}">
                                Category</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="condition">Condition *</label>
                    <select id="condition" name="condition" class="form-select" required>
                        <option value="" disabled selected>Select condition</option>
                        <option th:each="cond : ${conditions}" th:value="${cond.name()}" th:text="${cond.displayName}">
                            Condition</option>
                    </select>
                </div>

                <!-- ── Location ─────────────────────────────────────────────────── -->
                <div class="form-group">
                    <label>Your Location (for distance calculation)</label>

                    <!-- Search row -->
                    <div style="display:flex;gap:0.5rem;margin-bottom:0.5rem;">
                        <div class="input-wrapper" style="flex:1;margin-bottom:0">
                            <input type="text" id="address" name="address" class="form-control"
                                placeholder="Type your area / city / full address…" autocomplete="off"
                                oninput="onAddressInput()" />
                            <span class="input-icon">📍</span>
                        </div>
                        <button type="button" class="btn-location" id="searchBtn" onclick="searchAddress()">
                            🔍 Search
                        </button>
                        <button type="button" class="btn-location" id="gpsBtn" onclick="fetchGPS()"
                            title="Works on mobile or if Windows Location is ON">
                            📡 GPS
                        </button>
                    </div>

                    <!-- Suggestions dropdown -->
                    <ul id="suggestions" style="list-style:none;margin:0;padding:0;
                    background:rgba(30,27,58,0.98);border:1px solid rgba(124,58,237,0.3);
                    border-radius:10px;display:none;max-height:220px;overflow-y:auto;z-index:100;"></ul>

                    <input type="hidden" id="latitude" name="latitude" />
                    <input type="hidden" id="longitude" name="longitude" />
                    <div id="locStatus" style="font-size:0.82rem;margin-top:0.4rem;display:none;"></div>
                    <small style="color:#64748b;margin-top:0.3rem;display:block;">
                        💡 Type your area/city and press <b>Search</b> (or hit Enter) to find precise coordinates.
                        <b>GPS</b> button works on mobile or if Windows Location is enabled.
                    </small>
                </div>

                <button type="submit" class="btn btn-primary" style="margin-top:0.5rem;">
                    📤 List Book
                </button>
            </form>
        </div>
    </div>

    <script>
        function setStatus(msg, color) {
            const el = document.getElementById('locStatus');
            el.style.display = 'block';
            el.style.color = color || '#94a3b8';
            el.innerHTML = msg;
        }

        // ── Suggestions dropdown ───────────────────────────────────────────────────
        function showSuggestions(results) {
            const ul = document.getElementById('suggestions');
            ul.innerHTML = '';
            if (!results.length) { ul.style.display = 'none'; return; }
            results.forEach(r => {
                const li = document.createElement('li');
                li.textContent = r.display_name;
                li.style.cssText = 'padding:0.65rem 1rem;cursor:pointer;color:#cbd5e1;font-size:0.85rem;' +
                    'border-bottom:1px solid rgba(255,255,255,0.06);';
                li.onmouseenter = () => li.style.background = 'rgba(124,58,237,0.15)';
                li.onmouseleave = () => li.style.background = '';
                li.onclick = () => selectResult(r);
                ul.appendChild(li);
            });
            ul.style.display = 'block';
        }

        function selectResult(r) {
            document.getElementById('address').value = r.display_name;
            document.getElementById('latitude').value = r.lat;
            document.getElementById('longitude').value = r.lon;
            document.getElementById('suggestions').style.display = 'none';
            setStatus(`✅ Location set! (${parseFloat(r.lat).toFixed(4)}, ${parseFloat(r.lon).toFixed(4)})`, '#6ee7b7');
        }

        function onAddressInput() {
            document.getElementById('suggestions').style.display = 'none';
            document.getElementById('latitude').value = '';
            document.getElementById('longitude').value = '';
        }

        // ── Address → lat/lng (Nominatim forward geocoding) ───────────────────────
        async function searchAddress() {
            const query = document.getElementById('address').value.trim();
            if (!query) { setStatus('⚠️ Please type an address or city name first.', '#fcd34d'); return; }

            const btn = document.getElementById('searchBtn');
            btn.textContent = '⏳';
            btn.disabled = true;
            setStatus('🔍 Searching "' + query + '"…', '#c4b5fd');

            try {
                const res = await fetch(
                    `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5`,
                    { headers: { 'Accept-Language': 'en' } }
                );
                const data = await res.json();
                if (!data.length) {
                    setStatus('❌ No results. Try a more specific address.', '#fca5a5');
                } else if (data.length === 1) {
                    selectResult(data[0]);
                } else {
                    showSuggestions(data);
                    setStatus('📋 Multiple results found — select one below.', '#c4b5fd');
                }
            } catch {
                setStatus('❌ Search failed. Check your internet and try again.', '#fca5a5');
            }

            btn.textContent = '🔍 Search';
            btn.disabled = false;
        }

        // Enter key → search
        document.getElementById('address').addEventListener('keydown', e => {
            if (e.key === 'Enter') { e.preventDefault(); searchAddress(); }
        });

        // Click outside → close dropdown
        document.addEventListener('click', e => {
            if (!e.target.closest('#suggestions') && e.target.id !== 'address')
                document.getElementById('suggestions').style.display = 'none';
        });

        // ── GPS (mobile / Windows Location ON) ────────────────────────────────────
        async function fetchGPS() {
            const btn = document.getElementById('gpsBtn');
            btn.textContent = '⏳';
            btn.disabled = true;
            setStatus('📡 Requesting precise GPS location...', '#c4b5fd');

            if (!navigator.geolocation) {
                setStatus('❌ GPS not supported by your browser. Use the Search button.', '#fca5a5');
                btn.textContent = '📡 GPS'; btn.disabled = false;
                return;
            }

            const options = { timeout: 10000, enableHighAccuracy: true, maximumAge: 0 };

            const successCallback = async (pos) => {
                const lat = pos.coords.latitude, lng = pos.coords.longitude;
                document.getElementById('latitude').value = lat;
                document.getElementById('longitude').value = lng;
                setStatus('🔄 GPS coordinates found! Fetching address...', '#c4b5fd');
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`, { headers: { 'Accept-Language': 'en' } });
                    const data = await res.json();
                    document.getElementById('address').value = data.display_name || `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
                    setStatus('✅ GPS Location set successfully!', '#6ee7b7');
                } catch {
                    document.getElementById('address').value = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
                    setStatus('✅ GPS Coordinates saved (Address lookup failed).', '#6ee7b7');
                }
                btn.textContent = '📡 GPS'; btn.disabled = false;
            };

            const errorCallback = (err) => {
                // Try again with lower accuracy if it failed (common on laptops without GPS hardware)
                if (options.enableHighAccuracy) {
                    setStatus('⚠️ High accuracy failed. Retrying with standard location...', '#fcd34d');
                    options.enableHighAccuracy = false;
                    options.timeout = 5000;
                    navigator.geolocation.getCurrentPosition(successCallback, finalErrorCallback, options);
                } else {
                    finalErrorCallback(err);
                }
            };

            const finalErrorCallback = (err) => {
                btn.textContent = '📡 GPS'; btn.disabled = false;
                let msg = '❌ GPS Error: ';
                if (err.code === 1) msg += 'Permission denied. Please allow location access in browser settings.';
                else if (err.code === 2) msg += 'Position unavailable. <b>Check:</b> Windows Settings -> Privacy -> Location -> ON.';
                else if (err.code === 3) msg += 'Request timed out. Try the 🔍 Search button instead.';
                else msg += err.message;
                setStatus(msg, '#fca5a5');
            };

            navigator.geolocation.getCurrentPosition(successCallback, errorCallback, options);
        }
    </script>
</body>

</html>
